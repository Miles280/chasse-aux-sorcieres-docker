services:
  # --- TRAEFIK (Le remplaçant de Nginx + Certbot) ---
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - "--api.insecure=true" # Active le dashboard (ne pas exposer sur internet sans protection en prod stricte, mais ok pour débuter)
      - "--providers.docker=true" # Dit à Traefik d'écouter Docker
      - "--providers.docker.exposedbydefault=false" # Ne pas exposer les conteneurs qui n'ont pas de label explicite
      - "--entrypoints.web.address=:80" # Point d'entrée HTTP
      - "--entrypoints.websecure.address=:443" # Point d'entrée HTTPS

      # CHANGEMENT : HTTP challenge au lieu de TLS challenge
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.caServer=https://acme-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.email=loughsala.imed@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
      # - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      # - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080" # Décommente pour voir le dashboard Traefik (http://IP-VPS:8080)
    volumes:
      - "./acme.json:/acme.json" # Le fichier qu'on a créé pour stocker les certs
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Pour écouter Docker
    networks:
      - chasse_network

  # --- BASE DE DONNÉES ---
  db:
    image: mysql:8
    container_name: db
    env_file: ./db/.env
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    command: --skip-name-resolve
    ports:
      - "3306:3306"
    networks:
      - chasse_network
    deploy:
      resources:
        limits:
          memory: 450M

  # --- API SYMFONY ---
  api:
    build: ./api
    container_name: api
    env_file:
      - ./api/.env
      - ./api/.env.local
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./api:/var/www/html
      - jwt_data:/var/www/html/config/jwt
    networks:
      - chasse_network
    labels:
      - "traefik.enable=true"

      # ✅ ROUTER HTTP (obligatoire pour le challenge Let's Encrypt)
      - "traefik.http.routers.api-http.rule=Host(`api.chasse-aux-sorcieres.fr`)"
      - "traefik.http.routers.api-http.entrypoints=web"

      # ✅ ROUTER HTTPS
      - "traefik.http.routers.api-https.rule=Host(`api.chasse-aux-sorcieres.fr`)"
      - "traefik.http.routers.api-https.entrypoints=websecure"
      - "traefik.http.routers.api-https.tls.certresolver=myresolver"

      # Service commun aux deux routers
      - "traefik.http.services.api.loadbalancer.server.port=80"

  # --- SITE FRONTEND ---
  site:
    build: ./site
    container_name: site
    restart: unless-stopped
    networks:
      - chasse_network
    labels:
      - "traefik.enable=true"

      # ✅ ROUTER HTTP (obligatoire pour le challenge Let's Encrypt)
      - "traefik.http.routers.site-http.rule=Host(`chasse-aux-sorcieres.fr`)"
      - "traefik.http.routers.site-http.entrypoints=web"

      # ✅ ROUTER HTTPS
      - "traefik.http.routers.site-https.rule=Host(`chasse-aux-sorcieres.fr`)"
      - "traefik.http.routers.site-https.entrypoints=websecure"
      - "traefik.http.routers.site-https.tls.certresolver=myresolver"

      # Service commun aux deux routers
      - "traefik.http.services.site.loadbalancer.server.port=80"

  # --- BOT DISCORD ---
  bot:
    build: ./bot
    container_name: bot
    env_file: ./bot/src/.env
    restart: unless-stopped
    depends_on:
      - api
      - db
    networks:
      - chasse_network

volumes:
  db_data:
  jwt_data:

networks:
  chasse_network:
    driver: bridge
